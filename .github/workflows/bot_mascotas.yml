name: Bot de Mascotas Facebook

on:
  schedule:
    # Ejecutar a las 12:00, 18:00 y 23:00 UTC (9:00 AM, 3:00 PM y 8:00 PM en Argentina)
    - cron: '0 12,18,23 * * *'
  workflow_dispatch: # Permite ejecución manual desde la web de GitHub

permissions:
  contents: write # Da permiso al bot para subir archivos al repositorio

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar el bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python main.py

      - name: Guardar historial de temas
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add historial_temas.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualizar historial de temas [skip ci]" && git push)